name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build for Linux
        run: bun build ./src/iroha.ts --compile --target=bun-linux-x64 --minify --outfile iroha-linux-x64

      - name: Build for Windows
        run: bun build ./src/iroha.ts --compile --target=bun-windows-x64 --minify --outfile iroha-windows.exe

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        if: github.ref_type == 'tag'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            iroha-linux-x64
            iroha-windows.exe
            README.md
          draft: true
